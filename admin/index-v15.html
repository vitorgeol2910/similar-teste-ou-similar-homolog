<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Similar">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>Similar Engenharia - Painel (HOMOLOGAÇÃO V15)</title>
    <!-- Bibliotecas para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- EasyMDE - Editor Markdown com Toolbar Visual -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --primary-orange: #ea580c;
            --light-gray: #f5f5f5;
            --dark-gray: #333;
            --border-color: #ddd;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fffbe6;
            color: var(--dark-gray);
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #app { height: 100%; display: flex; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .logo-img { width: 32px; height: 32px; border-radius: 4px; margin-right: 8px; vertical-align: middle; }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .card { background: white; border-radius: 8px; padding: 16px; border: 1px solid var(--border-color); margin-bottom: 12px; }
        .proposal-item { display: flex; justify-content: space-between; align-items: center; }
        .proposal-info h3 { font-size: 14px; color: var(--primary-blue); margin-bottom: 2px; }
        .proposal-info p { font-size: 12px; color: #666; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn-primary { background-color: var(--primary-orange); color: white; width: 100%; margin-bottom: 16px; padding: 14px; font-size: 15px; }
        .btn-edit { background-color: var(--primary-blue); color: white; }
        .btn-delete { background-color: var(--danger-color); color: white; }
        .btn-view { background-color: var(--success-color); color: white; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        
        /* Upload de Imagens */
        .image-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            background: #f9f9f9;
            margin-bottom: 12px;
        }
        .image-upload-area input[type="file"] { display: none; }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .image-thumb {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .image-thumb:hover { border-color: var(--primary-orange); }
        
        /* Modal de Confirmação */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 90%;
            width: 400px;
            text-align: center;
        }
        .modal-content h3 { margin-bottom: 16px; color: var(--dark-gray); }
        .modal-content p { margin-bottom: 20px; color: #666; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
        
        .login-screen {
            height: 100vh;
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box { background: white; padding: 32px; border-radius: 12px; width: 100%; max-width: 340px; text-align: center; }
        .login-box img { width: 80px; margin-bottom: 16px; }
        .login-box h2 { color: var(--primary-blue); margin-bottom: 24px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; border: 1px solid #fecaca; }
        .success-msg { background: #dcfce7; color: #166534; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; border: 1px solid #bbf7d0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); }
        .tab { padding: 10px 16px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; }
        .tab.active { border-bottom-color: var(--primary-orange); color: var(--primary-orange); }
        .homolog-badge { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-bottom: 10px; display: inline-block; }
        
        /* Tabela de Itens */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            border: 1px solid var(--border-color);
        }
        .items-table th, .items-table td {
            padding: 8px;
            text-align: left;
            border: 1px solid var(--border-color);
            font-size: 12px;
        }
        .items-table th {
            background: #f0f0f0;
            font-weight: 600;
        }
        .items-table tr:hover {
            background: #f9f9f9;
        }
        
        /* Preview de PDF */
        .pdf-preview {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 6px;
            margin-top: 12px;
        }
        .pdf-preview h4 {
            margin-bottom: 12px;
            color: var(--primary-blue);
        }
        .pdf-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .pdf-data-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .pdf-data-item label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }
        .pdf-data-item value {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-blue);
            margin-top: 4px;
        }

        /* Customização do EasyMDE para mobile */
        .CodeMirror {
            border: 1px solid var(--border-color) !important;
            border-radius: 0 0 4px 4px !important;
            font-size: 14px !important;
            font-family: monospace !important;
        }
        .editor-toolbar {
            background: #f0f0f0 !important;
            border: 1px solid var(--border-color) !important;
            border-bottom: none !important;
            border-radius: 4px 4px 0 0 !important;
        }
        .editor-toolbar button {
            background: white !important;
            border: 1px solid var(--border-color) !important;
            color: var(--dark-gray) !important;
            font-size: 12px !important;
        }
        .editor-toolbar button:hover {
            background: #e0e0e0 !important;
        }
        .editor-toolbar i {
            color: var(--primary-blue) !important;
        }
        .editor-preview {
            background: white !important;
            border: 1px solid var(--border-color) !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Carregando painel de homologação V15...</div>
    </div>
    
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Deletar Proposta?</h3>
            <p id="deleteMessage"></p>
            <div class="modal-actions">
                <button onclick="cancelDelete()" style="background: #ccc; color: #333;">Cancelar</button>
                <button onclick="confirmDelete()" style="background: var(--danger-color); color: white;">Deletar</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const state = {
            isLoggedIn: false,
            currentProposal: null,
            proposals: [],
            currentTab: 'list',
            markdownEditor: null
        };

        // ============ INICIALIZAÇÃO ============
        async function initApp() {
            const token = localStorage.getItem('github_token');
            if (!token) {
                showLoginScreen();
            } else {
                state.isLoggedIn = true;
                await loadProposals();
                renderApp();
            }
        }

        // ============ TELA DE LOGIN ============
        function showLoginScreen() {
            document.getElementById('app').innerHTML = `
                <div class="login-screen">
                    <div class="login-box">
                        <img src="logo.png" alt="Similar">
                        <h2>Similar Engenharia</h2>
                        <p style="margin-bottom: 20px; color: #666;">Painel de Homologação V15</p>
                        <div class="form-group">
                            <label>Token GitHub</label>
                            <input type="password" id="tokenInput" class="form-control" placeholder="ghp_xxxxx">
                        </div>
                        <button class="btn btn-primary" onclick="handleLogin()">🔓 Acessar</button>
                    </div>
                </div>
            `;
        }

        function handleLogin() {
            const token = document.getElementById('tokenInput').value;
            if (token) {
                localStorage.setItem('github_token', token);
                state.isLoggedIn = true;
                loadProposals().then(() => renderApp());
            }
        }

        // ============ CARREGAR PROPOSTAS ============
        async function loadProposals() {
            // Simular carregamento de propostas do GitHub
            state.proposals = [
                { id: 1, client: 'Cliente Exemplo', number: 'PROP-001', date: '2026-04-07', total: 'R$ 5.000,00' }
            ];
        }

        // ============ RENDERIZAR APP ============
        function renderApp() {
            const html = `
                <div class="header">
                    <div>
                        <img src="logo.png" class="logo-img" alt="Logo">
                        <h1>Similar Engenharia - V15</h1>
                    </div>
                    <button class="btn-logout" onclick="handleLogout()">Sair</button>
                </div>
                <div class="main">
                    ${state.currentTab === 'list' ? renderProposalList() : renderProposalForm()}
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            // Inicializar EasyMDE se estamos no formulário
            if (state.currentTab === 'form' && !state.markdownEditor) {
                setTimeout(initMarkdownEditor, 100);
            }
        }

        // ============ LISTA DE PROPOSTAS ============
        function renderProposalList() {
            return `
                <div class="homolog-badge">🧪 AMBIENTE DE HOMOLOGAÇÃO V15</div>
                <button class="btn btn-primary" onclick="newProposal()">➕ NOVA PROPOSTA</button>
                ${state.proposals.map(p => `
                    <div class="card">
                        <div class="proposal-item">
                            <div class="proposal-info">
                                <h3>${p.client}</h3>
                                <p>Proposta: ${p.number}</p>
                                <p>Data: ${p.date} | Total: ${p.total}</p>
                            </div>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="editProposal(${p.id})">✏️ Editar</button>
                                <button class="btn btn-delete" onclick="deleteProposal(${p.id})">🗑️ Deletar</button>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        // ============ FORMULÁRIO DE PROPOSTA ============
        function renderProposalForm() {
            return `
                <button class="btn btn-edit" onclick="goBack()" style="margin-bottom: 12px;">← Voltar</button>
                <div class="card">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('dados')">📋 Dados</div>
                        <div class="tab" onclick="switchTab('descricao')">📝 Descrição</div>
                        <div class="tab" onclick="switchTab('imagens')">🖼️ Imagens</div>
                        <div class="tab" onclick="switchTab('pdf')">📄 PDF</div>
                    </div>
                    
                    <div id="tab-dados" class="tab-content">
                        <div class="form-group">
                            <label>Cliente</label>
                            <input type="text" id="clientName" class="form-control" placeholder="Nome do cliente">
                        </div>
                        <div class="form-group">
                            <label>Número da Proposta</label>
                            <input type="text" id="proposalNumber" class="form-control" placeholder="PROP-001">
                        </div>
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="proposalDate" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Valor Total</label>
                            <input type="text" id="totalValue" class="form-control" placeholder="R$ 0,00">
                        </div>
                    </div>
                    
                    <div id="tab-descricao" class="tab-content" style="display: none;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Descrição (com Formatação)</label>
                        <textarea id="descriptionEditor"></textarea>
                    </div>
                    
                    <div id="tab-imagens" class="tab-content" style="display: none;">
                        <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">
                            📸 Clique para fazer upload de imagens
                        </div>
                        <input type="file" id="imageInput" multiple accept="image/*" onchange="handleImageUpload(event)">
                        <div class="image-gallery" id="imageGallery"></div>
                    </div>
                    
                    <div id="tab-pdf" class="tab-content" style="display: none;">
                        <div class="image-upload-area" onclick="document.getElementById('pdfInput').click()">
                            📄 Clique para fazer upload de PDF
                        </div>
                        <input type="file" id="pdfInput" accept=".pdf" onchange="handlePdfUpload(event)">
                        <div id="pdfPreview"></div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="saveProposal()" style="margin-top: 16px;">💾 SALVAR PROPOSTA</button>
                </div>
            `;
        }

        // ============ EDITOR MARKDOWN ============
        function initMarkdownEditor() {
            const textarea = document.getElementById('descriptionEditor');
            if (!textarea) return;

            state.markdownEditor = new EasyMDE({
                element: textarea,
                spellChecker: false,
                autoDownloadFontAwesome: false,
                toolbar: [
                    'bold',
                    'italic',
                    'heading',
                    '|',
                    'quote',
                    'unordered-list',
                    'ordered-list',
                    '|',
                    'table',
                    'link',
                    '|',
                    'preview',
                    'side-by-side',
                    'fullscreen',
                    '|',
                    'guide'
                ],
                previewRender: function(plainText) {
                    return plainText;
                }
            });

            // Restaurar conteúdo anterior se existir
            if (state.currentProposal && state.currentProposal.description) {
                state.markdownEditor.value(state.currentProposal.description);
            }
        }

        // ============ GERENCIAMENTO DE ABAS ============
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).style.display = 'block';
            event.target.classList.add('active');

            if (tabName === 'descricao' && !state.markdownEditor) {
                setTimeout(initMarkdownEditor, 50);
            }
        }

        // ============ FUNÇÕES DE PROPOSTA ============
        function newProposal() {
            state.currentProposal = null;
            state.currentTab = 'form';
            renderApp();
        }

        function editProposal(id) {
            state.currentProposal = state.proposals.find(p => p.id === id);
            state.currentTab = 'form';
            renderApp();
        }

        function goBack() {
            state.currentTab = 'list';
            state.currentProposal = null;
            renderApp();
        }

        function deleteProposal(id) {
            const proposal = state.proposals.find(p => p.id === id);
            document.getElementById('deleteMessage').textContent = `Tem certeza que deseja deletar a proposta "${proposal.client}"?`;
            document.getElementById('deleteModal').classList.add('show');
            window.proposalToDelete = id;
        }

        function confirmDelete() {
            state.proposals = state.proposals.filter(p => p.id !== window.proposalToDelete);
            document.getElementById('deleteModal').classList.remove('show');
            renderApp();
        }

        function cancelDelete() {
            document.getElementById('deleteModal').classList.remove('show');
        }

        function saveProposal() {
            const formData = {
                client: document.getElementById('clientName').value,
                number: document.getElementById('proposalNumber').value,
                date: document.getElementById('proposalDate').value,
                total: document.getElementById('totalValue').value,
                description: state.markdownEditor ? state.markdownEditor.value() : ''
            };

            if (!formData.client || !formData.number) {
                alert('Por favor, preencha os campos obrigatórios!');
                return;
            }

            if (state.currentProposal) {
                Object.assign(state.currentProposal, formData);
            } else {
                state.proposals.push({
                    id: Date.now(),
                    ...formData
                });
            }

            alert('✅ Proposta salva com sucesso!');
            goBack();
        }

        function handleImageUpload(event) {
            // Implementar upload de imagens
            console.log('Upload de imagens:', event.target.files);
        }

        function handlePdfUpload(event) {
            // Implementar upload e extração de PDF
            console.log('Upload de PDF:', event.target.files);
        }

        function handleLogout() {
            localStorage.removeItem('github_token');
            state.isLoggedIn = false;
            showLoginScreen();
        }

        // Iniciar app
        initApp();
    </script>
</body>
</html>
