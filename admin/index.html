<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Similar">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>Similar Engenharia - Painel (HOMOLOGAÇÃO V14.4)</title>
    <!-- Bibliotecas para PDF e Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --primary-orange: #ea580c;
            --light-gray: #f5f5f5;
            --dark-gray: #333;
            --border-color: #ddd;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fffbe6;
            color: var(--dark-gray);
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #app { height: 100%; display: flex; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .logo-img { width: 32px; height: 32px; border-radius: 4px; margin-right: 8px; vertical-align: middle; }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .card { background: white; border-radius: 8px; padding: 16px; border: 1px solid var(--border-color); margin-bottom: 12px; }
        .proposal-item { display: flex; justify-content: space-between; align-items: center; }
        .proposal-info h3 { font-size: 14px; color: var(--primary-blue); margin-bottom: 2px; }
        .proposal-info p { font-size: 12px; color: #666; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn-primary { background-color: var(--primary-orange); color: white; width: 100%; margin-bottom: 16px; padding: 14px; font-size: 15px; }
        .btn-edit { background-color: var(--primary-blue); color: white; }
        .btn-delete { background-color: var(--danger-color); color: white; }
        .btn-view { background-color: var(--success-color); color: white; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        
        /* Editor Visual */
        .editor-toolbar {
            display: flex;
            gap: 4px;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px 4px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
            flex-wrap: wrap;
        }
        .editor-btn {
            padding: 6px 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .editor-btn:hover { background: #e0e0e0; }
        .editor-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 0 0 4px 4px;
            font-size: 14px;
            min-height: 150px;
            font-family: monospace;
        }
        
        /* Upload de Imagens */
        .image-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            background: #f9f9f9;
            margin-bottom: 12px;
        }
        .image-upload-area input[type="file"] { display: none; }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .image-thumb {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .image-thumb:hover { border-color: var(--primary-orange); }
        
        /* Modal de Confirmação */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 90%;
            width: 400px;
            text-align: center;
        }
        .modal-content h3 { margin-bottom: 16px; color: var(--dark-gray); }
        .modal-content p { margin-bottom: 20px; color: #666; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
        
        .login-screen {
            height: 100vh;
            background: linear-gradient(135deg, #92400e 0%, #78350f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box { background: white; padding: 32px; border-radius: 12px; width: 100%; max-width: 340px; text-align: center; }
        .login-box img { width: 80px; margin-bottom: 16px; }
        .login-box h2 { color: var(--primary-blue); margin-bottom: 24px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; border: 1px solid #fecaca; }
        .success-msg { background: #dcfce7; color: #166534; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; border: 1px solid #bbf7d0; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); }
        .tab { padding: 10px 16px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; }
        .tab.active { border-bottom-color: var(--primary-orange); color: var(--primary-orange); }
        .homolog-badge { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-bottom: 10px; display: inline-block; }
        
        /* Tabela de Itens */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            border: 1px solid var(--border-color);
        }
        .items-table th, .items-table td {
            padding: 8px;
            text-align: left;
            border: 1px solid var(--border-color);
            font-size: 12px;
        }
        .items-table th {
            background: #f0f0f0;
            font-weight: 600;
        }
        .items-table tr:hover {
            background: #f9f9f9;
        }
        
        /* Preview de PDF */
        .pdf-preview {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 6px;
            margin-top: 12px;
        }
        .pdf-preview h4 {
            margin-bottom: 12px;
            color: var(--primary-blue);
        }
        .pdf-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .pdf-data-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .pdf-data-item label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }
        .pdf-data-item value {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-blue);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Carregando painel de homologação V14.4...</div>
    </div>
    
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Deletar Proposta?</h3>
            <p id="deleteMessage"></p>
            <div class="modal-actions">
                <button onclick="cancelDelete()" style="background: #ccc; color: #333;">Cancelar</button>
                <button onclick="confirmDelete()" style="background: var(--danger-color); color: white;">Deletar</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const state = {
            isLoggedIn: false,
            currentPage: 'list',
            currentTab: 'form',
            proposals: [],
            selectedProposal: null,
            loading: false,
            error: null,
            success: null,
            token: localStorage.getItem('gh_token'),
            user: localStorage.getItem('gh_user'),
            uploadedImages: [],
            deleteTarget: null,
            extractedPDFData: null
        };

        const GITHUB_CONFIG = {
            owner: 'vitorgeol2910',
            repo: 'similar-teste-ou-similar-homolog',
            path: 'propostas'
        };

        async function fetchProposals() {
            if (!state.token) return;
            state.loading = true;
            state.error = null;
            render();
            try {
                const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
                
                const res = await fetch(url, {
                    headers: { 
                        'Authorization': `token ${state.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(`Erro GitHub (${res.status}): ${errorData.message}`);
                }

                const files = await res.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));
                
                state.proposals = await Promise.all(mdFiles.map(async f => {
                    try {
                        const contentRes = await fetch(f.download_url);
                        const text = await contentRes.text();
                        const meta = {};
                        const yamlMatch = text.match(/---\n([\s\S]*?)\n---/);
                        if (yamlMatch) {
                            yamlMatch[1].split('\n').forEach(line => {
                                const [k, ...v] = line.split(':');
                                if (k && v.length) meta[k.trim()] = v.join(':').trim();
                            });
                        }
                        return { ...f, ...meta, content: text.replace(/---\n([\s\S]*?)\n---/, '').trim() };
                    } catch (e) {
                        console.error('Erro ao ler arquivo:', f.name, e);
                        return { ...f, client: f.name, content: '' };
                    }
                }));
                
            } catch (e) {
                console.error('Erro fatal:', e);
                state.error = e.message;
            } finally {
                state.loading = false;
                render();
            }
        }

        async function saveProposal(data) {
            state.loading = true;
            state.error = null;
            state.success = null;
            render();
            
            const safeClient = data.client.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-");
            const fileName = `${safeClient}-${data.number}.md`;
            const content = `---\nclient: ${data.client}\nnumber: ${data.number}\ndate: ${data.date}\nvalue: ${data.value}\ndeadline: ${data.deadline}\nconsultant: ${data.consultant}\nwhatsapp: ${data.whatsapp}\n---\n\n${data.description || ''}`;
            
            const body = {
                message: `Update proposal ${data.number} - ${data.client}`,
                content: btoa(unescape(encodeURIComponent(content))),
                sha: data.sha
            };

            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}/${fileName}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${state.token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(`Erro ao salvar (${res.status}): ${errorData.message}`);
                }

                state.success = '✅ Proposta salva com sucesso!';
                setTimeout(() => {
                    state.currentPage = 'list';
                    state.success = null;
                    fetchProposals();
                }, 1500);
            } catch (e) {
                state.error = e.message;
            } finally {
                state.loading = false;
                render();
            }
        }

        async function deleteProposal(proposal) {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}/${proposal.name}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `token ${state.token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        message: `Delete proposal ${proposal.number}`,
                        sha: proposal.sha
                    })
                });

                if (!res.ok) throw new Error('Erro ao deletar');
                
                state.currentPage = 'list';
                await fetchProposals();
            } catch (e) {
                state.error = 'Erro ao deletar proposta: ' + e.message;
                render();
            }
        }

        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                text += textContent.items.map(item => item.str).join(' ') + '\n';
            }
            return text;
        }

        function extractPDFManually(text) {
            const data = {
                cliente: '',
                numero: '',
                data: '',
                valor: '',
                prazo: '',
                itens: []
            };

            console.log("Texto extraído do PDF:", text);

            // Extrair número da proposta (PEDIDO DE VENDA Nº8170 ou PEDIDO DE VENDA Nº 8170)
            const numeroMatch = text.match(/PEDIDO DE VENDA\s*Nº?\s*(\d+)/i);
            if (numeroMatch) data.numero = numeroMatch[1];

            // Extrair cliente (1023 ORÇAMENTO PARA: NOME DO CLIENTE)
            // Tenta pegar o nome completo após "ORÇAMENTO PARA:" de forma mais agressiva
            const clienteMatch = text.match(/ORÇAMENTO PARA:\s*([A-Z\s0-9.-]+?)(?=\s+Endereço|CEP|CNPJ|Vendedor|Bairro|Fone|I\.E|$)/i);
            if (clienteMatch) {
                data.cliente = clienteMatch[1].trim();
            }

            // Extrair data (Data 26/02/2026)
            const dataMatch = text.match(/Data\s+(\d{2}\/\d{2}\/\d{4})/i);
            if (dataMatch) {
                const [d, m, y] = dataMatch[1].split('/');
                data.data = `${y}-${m}-${d}`;
            }

            // Extrair valor (R$: 8,00 ou Total 8,00)
            // Pega o último valor monetário encontrado que parece ser o total
            const valores = text.match(/R\$[:\s]*([\d.,]+)/gi);
            if (valores && valores.length > 0) {
                const ultimoValor = valores[valores.length - 1];
                data.valor = ultimoValor.replace(/R\$[:\s]*/i, '').replace(',', '.');
            } else {
                const valorMatch = text.match(/Total\s+([\d.,]+)/i);
                if (valorMatch) data.valor = valorMatch[1].replace(',', '.');
            }

            // Extrair itens da tabela (Código Descrição Quantidade Unidade Preço Total)
            // Padrão Industrial: Código(Num) + Descrição(Texto) + Qtd(Num) + Unidade(PCS/UN) + Preço(Num) + Total(Num)
            // Ex: 5939 PLUG TIPO CANHÃO 16 A 2P+T AZUL - STECK TRITON 2,0000 PCS 47,80 95,60
            const regexLinha = /(\d{3,})\s+([A-Z0-9\s.,/()\-+]+?)\s+([\d.,]+)\s+([A-Z]{2,3})\s+([\d.,]+)\s+([\d.,]+)/g;
            let match;
            while ((match = regexLinha.exec(text)) !== null) {
                // Evita pegar o número da proposta ou CEP como código de item
                const codigo = match[1];
                if (codigo.length >= 3 && codigo.length <= 6) {
                    data.itens.push({
                        codigo: codigo,
                        descricao: match[2].trim(),
                        quantidade: match[3],
                        preco: match[5],
                        total: match[6]
                    });
                }
            }

            return data;
        }

        async function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            state.loading = true;
            state.error = null;
            render();

            try {
                const text = await extractTextFromPDF(file);
                const extractedData = extractPDFManually(text);
                
                state.extractedPDFData = extractedData;
                state.loading = false;
                render();
                
                if (state.extractedPDFData) {
                    const data = state.extractedPDFData;
                    const preview = document.getElementById('pdfPreview');
                    preview.innerHTML = `
                        <div class="pdf-preview">
                            <h4>✅ Dados Extraídos pela IA V14.4:</h4>
                            <div class="pdf-data-grid">
                                <div class="pdf-data-item">
                                    <label>Cliente</label>
                                    <value>${data.cliente || '-'}</value>
                                </div>
                                <div class="pdf-data-item">
                                    <label>Número</label>
                                    <value>${data.numero || '-'}</value>
                                </div>
                                <div class="pdf-data-item">
                                    <label>Data</label>
                                    <value>${data.data || '-'}</value>
                                </div>
                                <div class="pdf-data-item">
                                    <label>Valor</label>
                                    <value>R$ ${data.valor || '-'}</value>
                                </div>
                            </div>
                            
                            ${data.itens && data.itens.length > 0 ? `
                                <h4 style="margin-top:16px">📋 Itens Encontrados (${data.itens.length}):</h4>
                                <table class="items-table">
                                    <thead>
                                        <tr>
                                            <th>Código</th>
                                            <th>Descrição</th>
                                            <th>Qtd</th>
                                            <th>Preço</th>
                                            <th>Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${data.itens.map(item => `
                                            <tr>
                                                <td>${item.codigo}</td>
                                                <td>${item.descricao}</td>
                                                <td>${item.quantidade}</td>
                                                <td>${item.preco}</td>
                                                <td>${item.total}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            ` : '<p style="font-size:12px; color:red; margin-top:10px">Nenhum item de tabela identificado.</p>'}
                            
                            <div style="display:flex; gap:10px; margin-top:16px">
                                <button class="btn btn-edit" style="flex:1" onclick="applyExtractedData()">✅ APLICAR DADOS</button>
                                <button class="btn btn-delete" style="flex:1" onclick="state.extractedPDFData=null; render()">❌ CANCELAR</button>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                state.error = 'Erro ao processar PDF: ' + e.message;
                state.loading = false;
                render();
            }
        }

        function applyFormat(format) {
            const textarea = document.getElementById('f-desc');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selected = textarea.value.substring(start, end);
            let formatted = '';

            switch(format) {
                case 'bold': formatted = `**${selected}**`; break;
                case 'italic': formatted = `*${selected}*`; break;
                case 'h1': formatted = `# ${selected}`; break;
                case 'h2': formatted = `## ${selected}`; break;
                case 'list': formatted = `- ${selected}`; break;
                case 'table': 
                    formatted = `\n| Código | Descrição | Qtd | Preço | Total |\n|--------|-----------|-----|-------|-------|\n| | | | | |\n`;
                    break;
            }

            textarea.value = textarea.value.substring(0, start) + formatted + textarea.value.substring(end);
            textarea.focus();
        }

        window.applyExtractedData = () => {
            if (!state.extractedPDFData) return;
            
            const data = state.extractedPDFData;
            
            // Mudar para a aba de formulário primeiro
            state.currentTab = 'form';
            render();
            
            // Preencher os campos com um pequeno delay para garantir que o DOM atualizou
            setTimeout(() => {
                // Preenchimento forçado por ID e por Estado
                const fields = {
                    'f-client': data.cliente || '',
                    'f-number': data.numero || '',
                    'f-date': data.data || '',
                    'f-value': data.valor || ''
                };

                for (const [id, val] of Object.entries(fields)) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.value = val;
                        el.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                }
                
                // Adicionar tabela de itens à descrição
                const descEl = document.getElementById('f-desc');
                if (descEl) {
                    let desc = descEl.value;
                    if (data.itens && data.itens.length > 0) {
                        desc += '\n\n## Itens da Proposta\n\n';
                        desc += '| Código | Descrição | Qtd | Preço | Total |\n';
                        desc += '|--------|-----------|-----|-------|-------|\n';
                        data.itens.forEach(item => {
                            desc += `| ${item.codigo} | ${item.descricao} | ${item.quantidade} | ${item.preco} | ${item.total} |\n`;
                        });
                    }
                    descEl.value = desc;
                    descEl.dispatchEvent(new Event('input', { bubbles: true }));
                }
                
                state.extractedPDFData = null;
                state.success = '✅ Dados do PDF aplicados com sucesso!';
                render();
            }, 300);
        };

        function render() {
            const app = document.getElementById('app');
            if (!state.token) {
                app.innerHTML = `
                    <div class="login-screen">
                        <div class="login-box">
                            <div class="homolog-badge">AMBIENTE DE HOMOLOGAÇÃO V14.4</div>
                            <img src="icon-192.png" alt="Logo">
                            <h2>Painel Similar</h2>
                            ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
                            <input type="text" id="login-user" class="form-control" placeholder="Seu Nome" style="margin-bottom:12px">
                            <input type="password" id="login-token" class="form-control" placeholder="Token GitHub" style="margin-bottom:20px">
                            <button class="btn btn-primary" onclick="login()">Entrar</button>
                            <p style="font-size:10px; color:#999; margin-top:10px">Repositório: ${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}</p>
                        </div>
                    </div>
                `;
                return;
            }

            let content = `
                <header class="header">
                    <div><img src="icon-192.png" class="logo-img"><h1>Propostas (V14.4 IA)</h1></div>
                    <button class="btn-logout" onclick="logout()">Sair</button>
                </header>
                <main class="main">
                    ${state.error ? `<div class="error-msg"><b>ERRO:</b> ${state.error}</div>` : ''}
                    ${state.success ? `<div class="success-msg">${state.success}</div>` : ''}
            `;

            if (state.loading) {
                content += '<div class="loading">Processando V14.4...</div>';
            } else if (state.currentPage === 'list') {
                content += `
                    <button class="btn btn-primary" onclick="state.currentPage='form'; state.currentTab='form'; state.selectedProposal=null; state.error=null; state.extractedPDFData=null; render()">+ NOVA PROPOSTA</button>
                    ${state.proposals.length === 0 && !state.error ? '<div class="loading">Nenhuma proposta encontrada na pasta /propostas/.</div>' : ''}
                    ${state.proposals.map(p => `
                        <div class="card proposal-item">
                            <div class="proposal-info">
                                <h3>${p.client || 'Sem Nome'}</h3>
                                <p>Nº ${p.number || '-'} | ${p.date || '-'}</p>
                            </div>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="editProposal('${p.sha}')">Editar</button>
                                <a href="/p/${p.name.replace('.md', '')}" target="_blank" class="btn btn-view" style="text-decoration:none">Ver</a>
                                <button class="btn btn-delete" onclick="showDeleteConfirm('${p.sha}', '${p.client}')">Deletar</button>
                            </div>
                        </div>
                    `).join('')}
                `;
            } else if (state.currentPage === 'form') {
                const p = state.selectedProposal || {};
                content += `
                    <div class="tabs">
                        <div class="tab ${state.currentTab === 'form' ? 'active' : ''}" onclick="state.currentTab='form'; render()">📝 Formulário</div>
                        <div class="tab ${state.currentTab === 'pdf' ? 'active' : ''}" onclick="state.currentTab='pdf'; render()">🤖 IA PDF (V14.4)</div>
                    </div>
                    <div class="card">
                        ${state.currentTab === 'form' ? `
                            <h3>${p.sha ? 'Editar' : 'Nova'} Proposta</h3><br>
                            <div class="form-group"><label>Cliente</label><input id="f-client" class="form-control" value="${p.client || ''}"></div>
                            <div class="form-group"><label>Número</label><input id="f-number" class="form-control" value="${p.number || ''}"></div>
                            <div class="form-group"><label>Data</label><input id="f-date" type="date" class="form-control" value="${p.date || ''}"></div>
                            <div class="form-group"><label>Valor</label><input id="f-value" class="form-control" value="${p.value || ''}"></div>
                            <div class="form-group"><label>Prazo</label><input id="f-deadline" class="form-control" value="${p.deadline || ''}"></div>
                            <div class="form-group"><label>Consultor</label><input id="f-consultant" class="form-control" value="${p.consultant || ''}"></div>
                            <div class="form-group"><label>WhatsApp</label><input id="f-whatsapp" class="form-control" value="${p.whatsapp || ''}"></div>
                            
                            <div class="form-group">
                                <label>Descrição (com Formatação)</label>
                                <div class="editor-toolbar">
                                    <button class="editor-btn" onclick="applyFormat('bold')"><b>Negrito</b></button>
                                    <button class="editor-btn" onclick="applyFormat('italic')"><i>Itálico</i></button>
                                    <button class="editor-btn" onclick="applyFormat('h1')">H1</button>
                                    <button class="editor-btn" onclick="applyFormat('h2')">H2</button>
                                    <button class="editor-btn" onclick="applyFormat('list')">Lista</button>
                                    <button class="editor-btn" onclick="applyFormat('table')">Tabela</button>
                                </div>
                                <textarea id="f-desc" class="editor-textarea">${p.content || ''}</textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Inserir Imagens</label>
                                <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">
                                    📸 Clique para selecionar imagens da galeria
                                    <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageUpload(event)">
                                </div>
                                <div class="image-gallery" id="imageGallery"></div>
                            </div>
                            
                            <div style="display:flex; gap:10px">
                                <button class="btn btn-edit" style="flex:1" onclick="submitForm()">SALVAR NO GITHUB</button>
                                <button class="btn btn-delete" style="flex:1" onclick="state.currentPage='list'; state.error=null; state.extractedPDFData=null; render()">CANCELAR</button>
                            </div>
                        ` : `
                            <h3>🤖 Importar PDF com IA (V14.4)</h3><br>
                            <p style="font-size:12px; color:#666; margin-bottom:12px">A IA V14.4 está calibrada para extração de tabelas industriais completas.</p>
                            <div class="image-upload-area" onclick="document.getElementById('pdfInput').click()">
                                📄 Clique para selecionar um PDF
                                <input type="file" id="pdfInput" accept=".pdf" onchange="handlePDFUpload(event)">
                            </div>
                            <div id="pdfPreview"></div>
                        `}
                    </div>
                `;
            }

            content += '</main>';
            app.innerHTML = content;
        }

        window.login = () => {
            const user = document.getElementById('login-user').value;
            const token = document.getElementById('login-token').value;
            if (user && token) {
                localStorage.setItem('gh_token', token.trim());
                localStorage.setItem('gh_user', user.trim());
                state.token = token.trim();
                state.user = user.trim();
                fetchProposals();
            } else {
                alert('Preencha nome e token!');
            }
        };

        window.logout = () => {
            localStorage.clear();
            state.token = null;
            state.proposals = [];
            state.error = null;
            state.extractedPDFData = null;
            render();
        };

        window.editProposal = (sha) => {
            state.selectedProposal = state.proposals.find(p => p.sha === sha);
            state.currentPage = 'form';
            state.currentTab = 'form';
            state.error = null;
            state.extractedPDFData = null;
            render();
        };

        window.showDeleteConfirm = (sha, client) => {
            state.deleteTarget = state.proposals.find(p => p.sha === sha);
            document.getElementById('deleteMessage').textContent = `Tem certeza que deseja deletar a proposta de "${client}"? Esta ação não pode ser desfeita.`;
            document.getElementById('deleteModal').classList.add('show');
        };

        window.cancelDelete = () => {
            document.getElementById('deleteModal').classList.remove('show');
            state.deleteTarget = null;
        };

        window.confirmDelete = () => {
            if (state.deleteTarget) {
                deleteProposal(state.deleteTarget);
            }
            document.getElementById('deleteModal').classList.remove('show');
            state.deleteTarget = null;
        };

        window.submitForm = () => {
            const client = document.getElementById('f-client').value;
            const number = document.getElementById('f-number').value;
            if (!client || !number) {
                alert('Cliente e Número são obrigatórios!');
                return;
            }
            const data = {
                client: client,
                number: number,
                date: document.getElementById('f-date').value,
                value: document.getElementById('f-value').value,
                deadline: document.getElementById('f-deadline').value,
                consultant: document.getElementById('f-consultant').value,
                whatsapp: document.getElementById('f-whatsapp').value,
                description: document.getElementById('f-desc').value,
                sha: state.selectedProposal ? state.selectedProposal.sha : null
            };
            saveProposal(data);
        };

        window.handleImageUpload = (event) => {
            const files = Array.from(event.target.files);
            const gallery = document.getElementById('imageGallery');
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'image-thumb';
                    img.onclick = () => {
                        const desc = document.getElementById('f-desc');
                        desc.value += `\n![Imagem](${e.target.result})\n`;
                    };
                    gallery.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

        if (state.token) fetchProposals();
        else render();
    </script>
</body>
</html>
